version: '3.9'
services:
  postgres:
    image: postgres:15
    container_name: greenfleet_db
    environment:
      POSTGRES_DB: greenfleet
      POSTGRES_USER: greenfleet_user
      POSTGRES_PASSWORD: greenfleet_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped


volumes:
  postgres_data: